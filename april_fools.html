<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frank - Chief Biscuit Officer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      width: 560px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .header-bar {
      background: #111;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2e2e2e;
    }

    .header-bar svg {
      flex-shrink: 0;
    }

    .header-bar span {
      font-size: 11px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .profile-section {
      display: flex;
      gap: 0;
    }

    .photo-wrapper {
      flex-shrink: 0;
      width: 220px;
      height: 240px;
      overflow: hidden;
      position: relative;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(15%) contrast(1.05);
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(transparent, #1a1a1a);
    }

    .info-section {
      padding: 28px 28px 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .title {
      font-size: 11px;
      color: #888;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #c8a96e;
      margin-bottom: 20px;
    }

    .credentials {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .credential-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .credential-item svg {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .credential-text {
      font-size: 12px;
      color: #777;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .credential-text strong {
      color: #aaa;
      font-weight: 600;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid #2a2a2a;
    }

    .contact-row svg {
      flex-shrink: 0;
    }

    .contact-row span {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.5px;
    }

    .bottom-section {
      background: #111;
      border-top: 1px solid #2e2e2e;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .punchline {
      font-size: 15px;
      color: #c8a96e;
      font-style: italic;
      letter-spacing: 0.5px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-text {
      font-size: 9px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .reveal-section {
      background: #0a0a0a;
      border-top: 1px solid #222;
      padding: 16px 28px;
      text-align: center;
    }

    .reveal-text {
      font-size: 11px;
      color: #3a3a3a;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .april {
      color: #c8a96e;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header-bar">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" fill="#c8a96e" />
      <rect x="9" y="1" width="6" height="6" fill="#555" />
      <rect x="1" y="9" width="6" height="6" fill="#555" />
      <rect x="9" y="9" width="6" height="6" fill="#333" />
    </svg>
    <span>Official Profile &nbsp;/&nbsp; Verified Executive</span>
  </div>

  <div class="profile-section">
    <div class="photo-wrapper">
      <img src="ddori_frank.jpeg" alt="Frank" />
      <div class="photo-overlay"></div>
    </div>

    <div class="info-section">
      <div>
        <div class="name">Frank</div>
        <div class="title">Chief Biscuit Officer</div>
        <div class="divider"></div>

        <div class="credentials">
          <div class="credential-item">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="6" cy="6" r="5" stroke="#c8a96e" stroke-width="1"/>
              <line x1="6" y1="3" x2="6" y2="6.5" stroke="#c8a96e" stroke-width="1.2"/>
              <line x1="6" y1="6.5" x2="8" y2="8" stroke="#c8a96e" stroke-width="1.2"/>
            </svg>
            <div class="credential-text">
              <strong>13년 경력</strong> &nbsp;간식 수급 및 낮잠 최적화
            </div>
          </div>

          <div class="credential-item">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="1" y="3" width="10" height="7" rx="1" stroke="#c8a96e" stroke-width="1"/>
              <polyline points="1,4 6,7.5 11,4" stroke="#c8a96e" stroke-width="1"/>
            </svg>
            <div class="credential-text">
              <strong>frank@biscuit.corp</strong>
            </div>
          </div>

          <div class="credential-item">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M6 1C4.07 1 2.5 2.57 2.5 4.5C2.5 7.25 6 11 6 11C6 11 9.5 7.25 9.5 4.5C9.5 2.57 7.93 1 6 1Z" stroke="#c8a96e" stroke-width="1"/>
              <circle cx="6" cy="4.5" r="1.2" stroke="#c8a96e" stroke-width="1"/>
            </svg>
            <div class="credential-text">
              소파 코너 자리 &nbsp;/&nbsp; 대한민국
            </div>
          </div>
        </div>
      </div>

      <div class="contact-row">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="5" r="4" stroke="#444" stroke-width="1"/>
          <line x1="3" y1="5" x2="7" y2="5" stroke="#444" stroke-width="1"/>
          <line x1="5" y1="3" x2="5" y2="7" stroke="#444" stroke-width="1"/>
        </svg>
        <span>Availability: Always &nbsp;&bull;&nbsp; Response Rate: 100% (if treats are involved)</span>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="punchline">내가 그렇게 보고 싶었오 ?</div>
    <div class="badge">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <polygon points="9,1 11.5,6.5 17.5,7 13,11 14.5,17 9,14 3.5,17 5,11 0.5,7 6.5,6.5" stroke="#c8a96e" stroke-width="1" fill="none"/>
        <circle cx="9" cy="9" r="2.5" fill="#c8a96e"/>
      </svg>
      <span class="badge-text">Verified</span>
    </div>
  </div>

  <div class="reveal-section">
    <div class="reveal-text"><span class="april">April Fools</span> &nbsp;&bull;&nbsp; 2026.04.01 &nbsp;&bull;&nbsp; No Biscuits Were Harmed</div>
  </div>

</div>

</body>
</html>
